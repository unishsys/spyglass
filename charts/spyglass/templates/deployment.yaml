---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spyglass
  labels:
    {{- include "spyglass.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "spyglass.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spyglass.labels" . | nindent 8 }}
    spec:
      serviceAccountName: spyglass
      containers:
      - name: spyglass
        image: "{{ include "spyglass.image" . }}"
        command: ["/mapper"]
        args: ["incluster"]
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: PORT
          value: {{ .Values.service.port | quote }}
        - name: AUTH_MODE
          value: {{ .Values.auth.mode | quote }}
        {{- if eq .Values.auth.mode "proxy-header" }}
        - name: AUTH_PROXY_HEADER
          value: {{ .Values.auth.proxyHeader | quote }}
        {{- end }}
        {{- if eq .Values.auth.mode "token" }}
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.existingSecret | default (include "spyglass.secretName" .) }}
              key: AUTH_TOKEN
        {{- end }}
        {{- if or .Values.license.key .Values.license.existingSecret }}
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.license.existingSecret | default (include "spyglass.secretName" .) }}
              key: LICENSE_KEY
        {{- end }}
        - name: UPGRADE_URL
          value: {{ .Values.upgradeUrl | quote }}
        {{- if .Values.telemetryDisabled }}
        - name: TELEMETRY_DISABLED
          value: "true"
        {{- end }}
        {{- if .Values.cors.allowedOrigins }}
        - name: CORS_ALLOWED_ORIGINS
          value: {{ .Values.cors.allowedOrigins | quote }}
        {{- end }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /ping
            port: {{ .Values.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ping
            port: {{ .Values.service.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
