---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spyglass
  labels:
    {{- include "spyglass.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "spyglass.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spyglass.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the pods when the auth token / license Secret changes (env from
        # secretKeyRef isn't hot-reloaded otherwise).
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: spyglass
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: spyglass
        image: "{{ include "spyglass.image" . }}"
        command: ["/mapper"]
        args: ["incluster"]
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: PORT
          value: {{ .Values.service.port | quote }}
        - name: AUTH_MODE
          value: {{ .Values.auth.mode | quote }}
        {{- if eq .Values.auth.mode "proxy-header" }}
        - name: AUTH_PROXY_HEADER
          value: {{ .Values.auth.proxyHeader | quote }}
        {{- end }}
        {{- if eq .Values.auth.mode "token" }}
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.existingSecret | default (include "spyglass.secretName" .) }}
              key: AUTH_TOKEN
        {{- end }}
        {{- if or .Values.license.key .Values.license.existingSecret }}
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.license.existingSecret | default (include "spyglass.secretName" .) }}
              key: LICENSE_KEY
        {{- end }}
        - name: UPGRADE_URL
          value: {{ .Values.upgradeUrl | quote }}
        {{- if .Values.telemetryDisabled }}
        - name: TELEMETRY_DISABLED
          value: "true"
        {{- end }}
        {{- if .Values.cors.allowedOrigins }}
        - name: CORS_ALLOWED_ORIGINS
          value: {{ .Values.cors.allowedOrigins | quote }}
        {{- end }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        {{- with .Values.startupProbe }}
        startupProbe:
          httpGet:
            path: /ping
            port: {{ $.Values.service.port }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          httpGet:
            path: /ping
            port: {{ .Values.service.port }}
          {{- with .Values.readinessProbe }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        livenessProbe:
          httpGet:
            path: /ping
            port: {{ .Values.service.port }}
          {{- with .Values.livenessProbe }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- with .Values.extraVolumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
