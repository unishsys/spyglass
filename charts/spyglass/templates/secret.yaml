{{- /*
Chart-managed Secret holding AUTH_TOKEN and/or LICENSE_KEY when supplied inline
(i.e. not via auth.existingSecret / license.existingSecret).

The auth token, when not provided, is auto-generated AND kept stable across
`helm upgrade` by looking up the previously rendered Secret — so upgrades don't
silently rotate the token and lock everyone out.
*/}}
{{- $needAuth := and (eq .Values.auth.mode "token") (not .Values.auth.existingSecret) -}}
{{- $needLicense := and .Values.license.key (not .Values.license.existingSecret) -}}
{{- if or $needAuth $needLicense }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spyglass.secretName" . }}
  labels:
    {{- include "spyglass.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $needAuth }}
  {{- $token := .Values.auth.token }}
  {{- if not $token }}
    {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "spyglass.secretName" .) }}
    {{- if and $existing $existing.data (index $existing.data "AUTH_TOKEN") }}
      {{- $token = index $existing.data "AUTH_TOKEN" | b64dec }}
    {{- else }}
      {{- $token = randAlphaNum 40 }}
    {{- end }}
  {{- end }}
  AUTH_TOKEN: {{ $token | b64enc | quote }}
  {{- end }}
  {{- if $needLicense }}
  LICENSE_KEY: {{ .Values.license.key | b64enc | quote }}
  {{- end }}
{{- end }}
